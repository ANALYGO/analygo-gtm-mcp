name: Build and Push GTM MCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/analygo/gtm-mcp
          tags: |
            type=raw,value=main
            type=raw,value=latest
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            BUILD_SOURCE=${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}

  deploy:
    needs: build-and-push
    if: |
      vars.DEPLOY_AUTOMATION_ENABLED == 'true' &&
      !cancelled() &&
      needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Pull image on server and trigger Coolify redeploy
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          GHCR_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK }}
        run: |
          set -euo pipefail
          install -m 600 /dev/null /tmp/deploy_key
          echo "$DEPLOY_SSH_KEY" | base64 --decode > /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@${DEPLOY_SSH_HOST} \
            "echo '${GHCR_TOKEN}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
             docker pull ghcr.io/analygo/gtm-mcp:main"
          curl -sS \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "CF-Access-Client-Id: ${CF_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CF_CLIENT_SECRET}" \
            "${COOLIFY_WEBHOOK_URL}"
